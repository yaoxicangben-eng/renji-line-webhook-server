services:
  - type: web
    name: renji-ai-secretary-discord-bot
    runtime: node
    rootDir: discord-bot
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: template
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_APPLICATION_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_CHANNEL_LINE_NOTICE_ID
        sync: false
      - key: DISCORD_CHANNEL_ERROR_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: NOTICE_PDF_URL
        sync: false
      - key: PRE_INTERVIEW_FORM_URL
        sync: false
      - key: ONBOARDING_DELIVERY_DELAY_MINUTES
        value: 0
