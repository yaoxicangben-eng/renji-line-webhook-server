manual:
  title: "縁結び覚醒プログラム 作業マニュアル"
  format:
    preferred: "Googleドキュメントの項目別タブ"
    mvp: "1つのGoogleドキュメントに見出しと目次で作成し、必要に応じて手動でタブ分割"
  common_sections:
    - "目的"
    - "実施タイミング"
    - "担当者の作業"
    - "AI/Codex補助"
    - "禁止事項"
    - "チェックリスト"
    - "テンプレ文"
  global_rules:
    - "復縁、連絡、結婚、恋愛成就を保証しない"
    - "相手の気持ちを断定しない"
    - "相手を操作する助言をしない"
    - "顧客への重要返信は蓮司が確認する"
    - "PDF送信とLINE送信はログを残す"

tabs:
  - id: "00"
    name: "はじめに"
    purpose: "サービス概要、対応姿勢、禁止事項、返金リスク防止の基本方針を共有する"
    timing: "運用開始前、新人担当者の初回確認時"
    owner_tasks:
      - "サービスの目的を理解する"
      - "結果保証なしの方針を確認する"
      - "禁止表現と対応不可領域を確認する"
    ai_support:
      - "マニュアル要約"
      - "NG表現チェック"
    checklist:
      - "結果保証なしを説明できる"
      - "人間確認が必要な場面を理解している"
    templates:
      - "このサービスは、恋愛の結果を保証するものではなく、心と行動を整えるための伴走です。"

  - id: "01"
    name: "全体フロー"
    purpose: "購入者LINE登録から最終行動設計書送付までの流れを把握する"
    timing: "顧客対応開始前、運用確認時"
    owner_tasks:
      - "顧客の現在ステータスを確認する"
      - "次に必要な案内を判断する"
    ai_support:
      - "進捗整理"
      - "不足タスク抽出"
    checklist:
      - "顧客IDで全履歴を追える"
      - "LINE送信予定が記録されている"
    templates:
      - "ご登録ありがとうございます。まずは大切なご案内と事前フォームをご確認ください。"

  - id: "02"
    name: "購入者限定LINE"
    purpose: "LINE登録直後の案内、注意書きPDF、フォーム誘導、送信ルールを統一する"
    timing: "購入者が公式LINEに登録した直後"
    owner_tasks:
      - "LINEユーザーIDと顧客IDの紐づきを確認する"
      - "注意書きPDFとフォームURLが送られたか確認する"
    ai_support:
      - "登録時メッセージ案"
      - "送信ログ確認"
    checklist:
      - "注意書きPDFをフォーム入力前に送っている"
      - "顧客ID付きフォームURLになっている"
    templates:
      - "先にサービスの大切な注意事項をご確認ください。その後、事前フォームへご入力をお願いします。"

  - id: "03"
    name: "事前鑑定シート"
    purpose: "初回通話前に顧客と相手の状況を整理し、個別感のあるPDFを作成する"
    timing: "事前フォーム回答後"
    owner_tasks:
      - "フォーム回答内容を確認する"
      - "AI生成結果の断定表現を修正する"
      - "PDFリンク送信前に内容を確認する"
    ai_support:
      - "事前鑑定文生成"
      - "Googleドキュメント作成"
      - "PDF化"
      - "NG表現検出"
    checklist:
      - "Doc URLが保存されている"
      - "PDF URLが保存されている"
      - "送信予定時刻が回答から3時間後になっている"
    templates:
      - "事前にいただいた内容をもとに、今の恋の流れと初回通話で深く見るテーマを整理しました。"

  - id: "04"
    name: "週1LINE通話"
    purpose: "30分 x 4回の通話品質を安定させ、次の7日間の行動を決める"
    timing: "毎週のLINE通話前後"
    owner_tasks:
      - "通話前に前回メモとLINE相談履歴を確認する"
      - "通話中に顧客の現在地と次の行動を整理する"
      - "通話後にメモ、宿題、次回テーマを保存する"
    ai_support:
      - "文字起こし要約"
      - "宿題抽出"
      - "次回テーマ案"
    checklist:
      - "録画URLが保存されている"
      - "文字起こしと要約が通話メモにある"
      - "次回までの行動が明確になっている"
    templates:
      - "今日の通話では、今週の感情の動きと次の7日間の行動を一緒に整えていきます。"

  - id: "05"
    name: "公式LINE伴走"
    purpose: "相談対応の品質を安定させ、不安を煽らず行動に落とす"
    timing: "顧客からLINE相談が来た時"
    owner_tasks:
      - "相談内容を分類する"
      - "返信の優先度を判断する"
      - "AI返信案を確認し、必要に応じて修正する"
    ai_support:
      - "相談分類"
      - "返信案作成"
      - "NG表現チェック"
    checklist:
      - "即時返信保証のような表現をしていない"
      - "相手を操作する助言になっていない"
    templates:
      - "今すぐ結論を出すより、まず状況と感情を分けて見ていきましょう。"

  - id: "06"
    name: "心と行動ワーク"
    purpose: "不安時の衝動行動を止め、行動前に整理する"
    timing: "顧客が不安になった時、追いLINEしそうな時"
    owner_tasks:
      - "ワーク回答を確認する"
      - "AI整理結果を見て返信可否を判断する"
      - "必要な場合のみLINE返信する"
    ai_support:
      - "不安の正体整理"
      - "NG行動抽出"
      - "推奨行動提案"
      - "LINE文面案"
    checklist:
      - "ワーク回答を自動送信していない"
      - "蓮司確認済みフラグが付いている"
    templates:
      - "今は送る前に、一度気持ちと本当に望んでいる未来を整理してみましょう。"

  - id: "07"
    name: "彼の本音・現在地"
    purpose: "断定を避けながら、関係性の現在地を整理する"
    timing: "通話、LINE相談、最終設計書作成時"
    owner_tasks:
      - "事実と推測を分ける"
      - "距離感、障害、次の一手を整理する"
    ai_support:
      - "5層見立て"
      - "断定表現の緩和"
    checklist:
      - "彼の気持ちを断定していない"
      - "現実的な行動に落ちている"
    templates:
      - "今見えている事実から考えると、可能性としてはこの方向を丁寧に見ていくのがよさそうです。"

  - id: "08"
    name: "LINE文面・行動改善"
    purpose: "重さ、要求、タイミング、目的、余白の観点で文面と行動を整える"
    timing: "顧客が彼へLINE送信前に相談した時"
    owner_tasks:
      - "送信目的を確認する"
      - "重さや要求感を調整する"
      - "送信後の行動も伝える"
    ai_support:
      - "文面添削"
      - "修正文作成"
      - "送信タイミング案"
    checklist:
      - "相手に圧をかける文面ではない"
      - "返信要求が強すぎない"
    templates:
      - "今の文面は少し気持ちが強く見えやすいので、余白を残す形に整えます。"

  - id: "09"
    name: "最終30日設計書"
    purpose: "伴走終了後の30日間の方針を明確にする"
    timing: "4回目通話後、最終回後"
    owner_tasks:
      - "事前鑑定、通話メモ、LINE相談、ワーク履歴を確認する"
      - "AI生成結果を確認、修正する"
      - "PDFリンクを送信する"
    ai_support:
      - "素材統合"
      - "設計書生成"
      - "PDF化"
    checklist:
      - "4回分の通話メモが反映されている"
      - "LINE相談とワーク履歴が反映されている"
      - "継続提案が押し売りになっていない"
    templates:
      - "この1ヶ月の変化をふまえて、次の30日間で意識することを整理しました。"

  - id: "10"
    name: "注意書き・トラブル対応"
    purpose: "返金、誤解、過度な期待、禁止相談への対応を統一する"
    timing: "LINE登録直後、クレーム兆候、返金相談時"
    owner_tasks:
      - "注意書きPDFの送付状況を確認する"
      - "返金条件と対応範囲を確認する"
      - "不満やリスク兆候をログ化する"
    ai_support:
      - "リスク分類"
      - "対応文下書き"
      - "販売ページとの矛盾チェック"
    checklist:
      - "注意書きPDFを送付済み"
      - "法務確認が必要な内容を独断で回答していない"
    templates:
      - "大切なご案内として、サービスの範囲と対応条件を事前にご確認いただいております。"

  - id: "11"
    name: "Codex/システム運用"
    purpose: "GAS、LINE API、OpenAI API、トリガー、エラー対応を管理する"
    timing: "実装、テスト、保守、エラー発生時"
    owner_tasks:
      - "Script Propertiesを確認する"
      - "トリガーと送信ログを確認する"
      - "エラー時の再送可否を判断する"
    ai_support:
      - "エラー要約"
      - "修正案"
      - "テスト手順作成"
    checklist:
      - "本番顧客でテストしていない"
      - "送信管理にログが残っている"
    templates:
      - "送信前に、対象顧客、送信内容、PDF URL、送信予定時刻を必ず確認します。"

  - id: "12"
    name: "ナレッジ蓄積"
    purpose: "対応品質を改善し続けるため、良い返信や失敗例を蓄積する"
    timing: "顧客対応後、週次振り返り、月末"
    owner_tasks:
      - "良かった返信を保存する"
      - "不満や返金リスク事例を保存する"
      - "顧客タイプ別の対応方針を更新する"
    ai_support:
      - "ナレッジ分類"
      - "再利用しやすいテンプレ化"
    checklist:
      - "個人情報を不要に含めていない"
      - "次回返信案に活用できる形になっている"
    templates:
      - "この対応は不安が落ち着いた例として、ナレッジに保存します。"

  - id: "13"
    name: "チェックリスト"
    purpose: "通話前後、LINE返信前、PDF送信前、月末確認の抜け漏れを防ぐ"
    timing: "各運用タイミングの直前と直後"
    owner_tasks:
      - "チェック項目を確認する"
      - "未完了項目を次の作業に回す"
    ai_support:
      - "未完了タスク抽出"
      - "リスク項目の検出"
    checklist:
      - "通話前チェック"
      - "LINE返信前チェック"
      - "PDF送信前チェック"
      - "月末確認チェック"
    templates:
      - "送信前チェック: 顧客ID、宛先、PDF URL、NG表現、送信予定時刻を確認済み。"
